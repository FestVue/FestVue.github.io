<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestVue - The Ultimate Fest Management System</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;600;700&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #046A38;
            --accent: #D4AF37;
            --bg: #FDFBF7;
            --text: #1E293B;
        }
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg);
            font-family: 'Poppins', 'Anek Malayalam', sans-serif;
            text-align: center;
            color: var(--text);
        }
        h1 {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        h1 span {
            color: var(--accent);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--text);
            opacity: 0.8;
        }
        .login-btn {
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.3s;
        }
        .login-btn:hover {
            background-color: #03522b;
        }
    </style>
</head>
<body>

    <h1>Fest<span>Vue</span></h1>
    <p>വിദ്യാഭ്യാസ സ്ഥാപനങ്ങൾക്കായുള്ള സമ്പൂർണ്ണ ഫെസ്റ്റ് മാനേജ്മെന്റ് പോർട്ടൽ<br><br><strong>Coming Soon...</strong></p>
    
    <a href="login.html" class="login-btn">Admin Login</a>

</body>
</html>
